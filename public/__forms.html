<html>
  <head></head>
  <body>
    <form
      name="contact"
      data-netlify="true"
      hidden
    >
      <input type="hidden" name="form-name" value="contact" />
      <div>
        <label for="name">Name</label>
        <input id="name" name="name" type="text" required />
      </div>
      <div>
        <label for="email">Email</label>
        <input id="email" type="email" name="email" required />
      </div>
      <div>
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>
      </div>
    </form>
    <form
      name="uk-orders"
      data-netlify="true"
      hidden
    >
      <input type="hidden" name="form-name" value="uk-orders" />
      <div>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />
      </div>
      <div>
        <label for="comments">Comments / Questions</label>
        <textarea id="comments" name="comments" rows="5"></textarea>
      </div>
      <div>
        <input type="checkbox" name="d12-locations" value="yes" />
      </div>
      <div>
        <input type="checkbox" name="d12-locations-2" value="yes" />
      </div>
      <div>
        <input type="checkbox" name="mini-cave" value="yes" />
      </div>
      <div>
        <input type="checkbox" name="dungeon-tiles-1" value="yes" />
      </div>
      <div>
        <input type="checkbox" name="dungeon-tiles-2" value="yes" />
      </div>
      <div>
        <input type="checkbox" name="forest-tiles-1" value="yes" />
      </div>
      <div>
        <input type="checkbox" name="forest-tiles-2" value="yes" />
      </div>
    </form>
  </body>
</html>
